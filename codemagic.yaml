workflows:
  ios-release:
    name: StreamZone iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.streamzone.app
      node: v22.0.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Next.js web app
        script: npm run build
      - name: Install Capacitor and sync iOS
        script: npm run build && npx cap copy ios && npx cap sync ios
      - name: Create export options
        script: |
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>4998W46J93</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.streamzone.app</key>
              <string>StreamZone App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config "Release" \
            --archive-flags="-allowProvisioningUpdates -destination 'generic/platform=iOS' -sdk iphoneos CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER='StreamZone App Store' CODE_SIGN_IDENTITY='Apple Distribution'" \
            --export-options-plist /tmp/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
