<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Stadium lights effect -->
    <radialGradient id="stadiumCenter" cx="50%" cy="0%" r="70%" fx="50%" fy="0%">
      <stop offset="0%" style="stop-color:rgba(127, 255, 0, 0.12);stop-opacity:1" />
      <stop offset="50%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="stadiumLeft" cx="20%" cy="10%" r="50%" fx="20%" fy="10%">
      <stop offset="0%" style="stop-color:rgba(255, 184, 0, 0.08);stop-opacity:1" />
      <stop offset="40%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="stadiumRight" cx="80%" cy="10%" r="50%" fx="80%" fy="10%">
      <stop offset="0%" style="stop-color:rgba(255, 184, 0, 0.08);stop-opacity:1" />
      <stop offset="40%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    <!-- Diagonal stripes pattern -->
    <pattern id="diagonalStripes" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)">
      <rect width="2" height="6" fill="rgba(127, 255, 0, 0.04)"/>
    </pattern>
  </defs>

  <!-- Base navy background -->
  <rect width="1024" height="1024" fill="#0a1628"/>

  <!-- Stadium lights -->
  <rect width="1024" height="1024" fill="url(#stadiumCenter)"/>
  <rect width="1024" height="1024" fill="url(#stadiumLeft)"/>
  <rect width="1024" height="1024" fill="url(#stadiumRight)"/>

  <!-- Diagonal stripes overlay -->
  <rect width="1024" height="1024" fill="url(#diagonalStripes)"/>

  <!-- Decorative accent line top-left -->
  <rect x="100" y="150" width="120" height="8" rx="4" fill="#CCFF00" opacity="0.6"/>

  <!-- SZ Text -->
  <text x="512" y="620"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="420"
        font-weight="900"
        fill="#CCFF00"
        text-anchor="middle"
        letter-spacing="-20">SZ</text>

  <!-- Decorative accent line bottom-right -->
  <rect x="804" y="866" width="120" height="8" rx="4" fill="#CCFF00" opacity="0.6"/>
</svg>
